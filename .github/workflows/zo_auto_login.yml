name: Zo Auto Login Bot

on:
  schedule:
    # 这里的 cron 表达式可以根据需要调整。例如：每天北京时间早上 9 点运行
    # 注意：GitHub Actions 使用的是 UTC 时间，北京时间 9:00 是 UTC 01:00
    - cron: '0 1 * * *'
  workflow_dispatch: # 允许你在 GitHub 页面手动点击运行

jobs:
  login-and-screenshot:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install selenium
          # 如果你在代码中使用了 requests，也请加上：pip install requests

      - name: Setup Chrome
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: stable

      - name: Run Auto Login Script
        env:
          # 从 GitHub Secrets 中读取变量
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        run: |
          # 假设你的脚本文件名为 zo_login.py
          python login_zo.py

      - name: Upload Screenshot (Optional)
        # 如果脚本运行失败，或者你想在 GitHub 也可以直接看截图
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: login-screenshot
          path: login_success.png
          retention-days: 7
